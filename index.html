<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Projects</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f0f1a;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
        }
        .container {
            max-width: 700px;
            width: 100%;
            text-align: center;
        }
        h1 {
            font-size: 2.5rem;
            color: #fff;
            margin-bottom: 8px;
            letter-spacing: -1px;
        }
        .subtitle {
            color: #666;
            margin-bottom: 40px;
        }
        .projects {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .project-card {
            background: #1a1a2e;
            border: 1px solid #2a2a4a;
            border-radius: 12px;
            padding: 24px;
            text-align: left;
            text-decoration: none;
            color: inherit;
            transition: all 0.2s;
        }
        .project-card:hover {
            border-color: #e94560;
            transform: translateY(-2px);
        }
        .project-card h2 {
            color: #fff;
            font-size: 1.2rem;
            margin-bottom: 6px;
        }
        .project-card p {
            color: #888;
            font-size: 0.9rem;
            line-height: 1.5;
        }
        .project-card .arrow {
            color: #e94560;
            margin-left: 8px;
        }
        footer {
            margin-top: 60px;
            color: #444;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>AI Projects</h1>
        <p class="subtitle">Select a project to explore</p>

        <div class="projects">
            <a href="projects/mhs2-save/" class="project-card">
                <h2>MHS2 Save Transfer <span class="arrow">→</span></h2>
                <p>Transfer Monster Hunter Stories 2 save files between Steam accounts, or convert between PC and Switch formats. Client-side only — no uploads, no server.</p>
            </a>
        </div>

        <footer>
            <p>Crafted by Cormac</p>
        </footer>
    </div>
</body>
</html>
